<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 500px;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }

      h2 {
        margin: 20px 0 10px;
        font-size: 18px;
        color: #333;
      }

      .survey {
        margin: 20px 0;
        text-align: center;
        font-size: 14px;
        color: #555;
      }

      .survey button {
        padding: 6px 15px;
        margin: 10px 5px 0;
        border: 1px solid #ccc;
        background: #f9f9f9;
        border-radius: 5px;
        cursor: pointer;
      }

      .survey button:hover {
        background: #eaeaea;
      }

      .google-logo {
        text-align: center;
        font-size: 40px;
        font-weight: bold;
        margin: 20px 0;
      }

      .google-logo span:nth-child(1) {
        color: #4285f4;
      }
      .google-logo span:nth-child(2) {
        color: #db4437;
      }
      .google-logo span:nth-child(3) {
        color: #f4b400;
      }
      .google-logo span:nth-child(4) {
        color: #4285f4;
      }
      .google-logo span:nth-child(5) {
        color: #0f9d58;
      }
      .google-logo span:nth-child(6) {
        color: #db4437;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .row input {
        width: 50%;
      }

      .signup-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #3b82f6, #2563eb);
        border: none;
        color: white;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 20px;
      }

      .signup-btn:hover {
        opacity: 0.9;
      }

      .ride-buttons {
        display: flex;
        gap: 10px;
      }

      .request-btn {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .request-now {
        background: black;
        color: white;
      }

      .schedule {
        background: #eee;
        color: #333;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <input type="text" placeholder="Your name" />
      <input type="email" placeholder="Your email" />

      <div class="survey">
        <p>
          Thanks for chatting with our customer support.<br />
          Would you like to take our quick survey?
        </p>
        <button>Yes</button>
        <button>No</button>
      </div>

      <div class="google-logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span
        ><span>e</span>
      </div>

      <div class="row">
        <input type="text" placeholder="First name" />
        <input type="text" placeholder="Last name" />
      </div>
      <input type="email" placeholder="Email" />

      <button class="signup-btn">Sign Up</button>

      <h2>Request a ride now</h2>

      <input type="text" placeholder="Enter pickup location" />
      <input type="text" placeholder="Enter destination" />

      <div class="ride-buttons">
        <button class="request-btn request-now">Request now</button>
        <button class="request-btn schedule">Schedule for later</button>
      </div>
    </div>
  </body>
</html>
